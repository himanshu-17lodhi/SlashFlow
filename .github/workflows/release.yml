name: Release

on:
  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test:run

      - name: Run build
        run: pnpm build

      - name: Create release package
        run: |
          mkdir Materialify
          cp main.js Materialify/
          cp manifest.json Materialify/
          cp src/styles.css Materialify/
          cd Materialify
          zip -r ../Materialify.zip .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Materialify.zip
